{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:url("{% static 'img/login-bg.png' %}") no-repeat center center fixed;
            background-size:cover;
            font-family:'Poppins',sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            margin:0;
        }

        .overlay{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.35);
        }

        .login-card{
            position:relative;
            z-index:2;
            width:420px;
            background:rgba(255,255,255,.96);
            padding:35px;
            border-radius:18px;
            box-shadow:0 15px 35px rgba(0,0,0,.25);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            font-weight:700;
        }

        .form-label{
            font-weight:600;
        }

        .form-control{
            height:45px;
            border-radius:10px;
        }

        .btn-success{
            width:100%;
            height:45px;
            border-radius:10px;
            font-weight:600;
        }

        .footer-text{
            text-align:center;
            margin-top:20px;
        }

        a{
            text-decoration:none;
        }

    </style>

</head>
<body>

<div class="overlay"></div>

<div class="login-card">

    <h2>Welcome Back 👋</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    {% if form.errors %}
        <div class="alert alert-danger">
            Invalid username or password.
        </div>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Enter username"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter password"
                required>
        </div>

        <button class="btn btn-success">
            Login
        </button>

    </form>

    <div class="footer-text">
        Don't have an account?
        <a href="{% url 'register' %}">
            Register
        </a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
