{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEase</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:url("{% static 'img/home.png' %}") no-repeat center center;
            background-size:cover;
            height:100vh;
            overflow:hidden;
            position:relative;
        }

        body::before{
            content:"";
            position:absolute;
            inset:0;
            background:rgba(0,0,0,.45);
        }

        .container{
            position:relative;
            z-index:2;
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
        }

        h1{
            color:#fff;
            font-size:70px;
            font-weight:bold;
            margin-bottom:15px;
        }

        h1 span{
            color:#4ea8ff;
        }

        p{
            color:#eee;
            font-size:22px;
            margin-bottom:50px;
        }

        .button-row{
            display:flex;
            gap:25px;
            flex-wrap:wrap;
            justify-content:center;
        }

        .nav-button{

            display:flex;
            align-items:center;
            gap:10px;

            padding:15px 28px;

            text-decoration:none;

            background:#2563eb;

            color:white;

            border-radius:12px;

            transition:.3s;

            font-size:17px;

            font-weight:600;

            box-shadow:0 8px 20px rgba(0,0,0,.25);

        }

        .nav-button:hover{

            background:#1d4ed8;

            transform:translateY(-5px);

            color:white;

        }

        .nav-button svg{

            width:20px;

            height:20px;

            fill:white;

        }

        footer{

            position:absolute;

            bottom:10px;

            left:0;

            width:100%;

            text-align:center;

            color:white;

            font-size:15px;

            z-index:2;

        }

    </style>

</head>

<body>

<div class="container">

<h1>Welcome to <span>ShopEase</span></h1>

<p>Your One-Stop Online Shopping Destination</p>

<div class="button-row">

<a href="{% url 'login' %}" class="nav-button">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
<path d="M10 17l5-5-5-5v10zM19 3h-4v2h4v14h-4v2h4c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/>
</svg>

Login / Register

</a>


<a href="{% url 'product_list' %}" class="nav-button">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
<path d="M16 16H8v-2h8v2zm0-4H8V10h8v2zm0-4H8V6h8v2zm4-4H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z"/>
</svg>

View Products

</a>


<a href="{% url 'cart' %}" class="nav-button">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
<path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2zM7.16 14l.84-2h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49a.996.996 0 10-1.72-.96L16.16 10H9.1l-.94-2H4V6h2.1l3.6 7.59L8.24 15c-.13.24-.24.5-.24.78 0 .54.45.99.99.99h12v-2H7.42c-.14 0-.25-.11-.26-.25z"/>
</svg>

Cart

</a>

</div>

</div>

<footer>

&copy; <span id="year"></span> <strong>ShopEase</strong>. All Rights Reserved.

</footer>

<script>

document.getElementById("year").textContent=new Date().getFullYear();

</script>

</body>
</html>
